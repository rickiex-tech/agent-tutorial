server:
  port: 8081

spring:
  application:
    name: logistics-agent
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  ai:
    # 通义千问 —— OpenAI 兼容模式
    openai:
      # Spring AI 2.0 使用官方 openai-java SDK，仅在 base-url 后拼接 /chat/completions，故 base-url 须自带 /v1
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        model: qwen-plus
        temperature: 0.1
    # MCP Client —— 经 Streamable HTTP 连接 logistics-mcp-server（SSE 传输在 2.0 已弃用）
    mcp:
      client:
        name: logistics-agent
        version: 0.0.1
        type: SYNC
        request-timeout: 30s
        streamable-http:
          connections:
            logistics-server:
              url: http://localhost:8080
        toolcallback:
          enabled: true

logging:
  level:
    "[org.springframework.ai]": INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logistics:
  persistence:
    in-memory:
      enabled: ${LOGISTICS_PERSISTENCE_IN_MEMORY_ENABLED:false}
