spring:
  application:
    name: logistics-mcp-server
  ai:
    mcp:
      server:
        name: logistics-mcp-server
        version: 0.0.1
        protocol: STREAMABLE

logistics:
  mcp:
    governance:
      require-auth-header: true
      auth-header-name: X-User-Id
      rate-limit-per-minute: 120
      # MCP 流量鉴权：Agent 侧通过 McpClientAuthHeaderConfig 注入 X-User-Id Header，
      # 无需豁免 /mcp 路径；握手阶段注入 anonymous 保证连通性
      # excluded-auth-paths: /mcp   # 已禁用：启用完整鉴权链路
    circuit-breaker:
      failure-threshold: 2
      open-seconds: 20
      retry-max-attempts: 2
    tools:
      business-enabled: true
      data-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
